services:
  db:
    image: postgres:16
    container_name: db-lab-postgres
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "lab"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  atlas:
    image: arigaio/atlas:latest
    working_dir: /app
    volumes:
      - ..:/app
    depends_on:
      - db
volumes:
  pgdata:

