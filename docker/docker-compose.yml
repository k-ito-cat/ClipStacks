services:
  db:
    image: postgres:16
    container_name: db-lab-postgres
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "lab"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
  atlas:
    image: arigaio/atlas:latest
    working_dir: /app
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgres://postgres:postgres@db:5432/lab?search_path=public&sslmode=disable}"
      ATLAS_DEV_DATABASE_URL: "${ATLAS_DEV_DATABASE_URL:-postgres://postgres:postgres@db:5432/atlas_dev?search_path=public&sslmode=disable}"
    volumes:
      - ..:/app
    depends_on:
      - db
volumes:
  pgdata:
